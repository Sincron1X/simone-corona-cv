<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mio-cv-online</title>
    <script type="module" crossorigin src="/assets/index-DN_bbcJu.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-CthIes7J.css">
  </head>
  <body>
    <div id="root"></div>

    <!-- Hidden form for Netlify Forms bot detection -->
    <form name="contatto" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="nome" />
      <input type="email" name="email" />
      <textarea name="messaggio"></textarea>
      <input name="bot-field" />
    </form>

    <!-- Contact Tab -->
    <div id="contact-tab">
      <button id="contact-toggle" aria-label="Apri modulo di contatto">
        <span id="contact-toggle-text">Contattami</span>
        <svg id="contact-arrow" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div id="contact-form-container">
        <form id="contact-form" name="contatto" method="POST" data-netlify="true" netlify-honeypot="bot-field">
          <input type="hidden" name="form-name" value="contatto" />
          <p class="hidden-field"><label>Non compilare: <input name="bot-field" /></label></p>
          <div class="form-group">
            <label for="contact-nome">Nome e Cognome</label>
            <input type="text" id="contact-nome" name="nome" required placeholder="Il tuo nome e cognome" />
          </div>
          <div class="form-group">
            <label for="contact-email">Email</label>
            <input type="email" id="contact-email" name="email" required placeholder="La tua email" />
          </div>
          <div class="form-group">
            <label for="contact-messaggio">Messaggio</label>
            <textarea id="contact-messaggio" name="messaggio" required placeholder="Scrivi il tuo messaggio..." rows="4"></textarea>
          </div>
          <button type="submit" id="contact-submit">Invia</button>
          <div id="contact-success" class="hidden-field">Messaggio inviato con successo! Grazie per avermi contattato.</div>
          <div id="contact-error" class="hidden-field">Si è verificato un errore. Riprova più tardi.</div>
        </form>
      </div>
    </div>

    <style>
      #contact-tab {
        position: fixed;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        width: 90%;
        max-width: 500px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      #contact-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        padding: 12px 24px;
        background: linear-gradient(135deg, #1f3b73, #0f172a);
        color: #e2e8f0;
        border: 1px solid rgba(255,255,255,0.12);
        border-bottom: none;
        border-radius: 12px 12px 0 0;
        cursor: pointer;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.5px;
        transition: background 0.3s ease;
      }
      #contact-toggle:hover {
        background: linear-gradient(135deg, #2a4d8f, #1a2744);
      }
      #contact-arrow {
        transition: transform 0.3s ease;
      }
      #contact-tab.open #contact-arrow {
        transform: rotate(180deg);
      }
      #contact-form-container {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.4s ease;
        background: linear-gradient(180deg, #0f172a, #07111f);
        border-left: 1px solid rgba(255,255,255,0.1);
        border-right: 1px solid rgba(255,255,255,0.1);
      }
      #contact-tab.open #contact-form-container {
        max-height: 500px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
      }
      #contact-form {
        padding: 20px 24px 24px;
      }
      #contact-form .form-group {
        margin-bottom: 16px;
      }
      #contact-form label {
        display: block;
        color: #94a3b8;
        font-size: 13px;
        font-weight: 500;
        margin-bottom: 6px;
        letter-spacing: 0.3px;
      }
      #contact-form input[type="text"],
      #contact-form input[type="email"],
      #contact-form textarea {
        width: 100%;
        padding: 10px 14px;
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 8px;
        color: #e2e8f0;
        font-size: 14px;
        font-family: inherit;
        transition: border-color 0.2s ease, background 0.2s ease;
        box-sizing: border-box;
      }
      #contact-form input[type="text"]:focus,
      #contact-form input[type="email"]:focus,
      #contact-form textarea:focus {
        outline: none;
        border-color: #3b82f6;
        background: rgba(255,255,255,0.09);
      }
      #contact-form input::placeholder,
      #contact-form textarea::placeholder {
        color: #4b5e7a;
      }
      #contact-form textarea {
        resize: vertical;
        min-height: 80px;
      }
      #contact-submit {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #3b82f6, #1d4ed8);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s ease, transform 0.1s ease;
        letter-spacing: 0.3px;
      }
      #contact-submit:hover {
        opacity: 0.9;
      }
      #contact-submit:active {
        transform: scale(0.98);
      }
      #contact-submit:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .hidden-field {
        display: none !important;
      }
      #contact-success {
        text-align: center;
        color: #4ade80;
        font-size: 14px;
        padding: 12px;
        margin-top: 12px;
        background: rgba(74,222,128,0.08);
        border-radius: 8px;
      }
      #contact-error {
        text-align: center;
        color: #f87171;
        font-size: 14px;
        padding: 12px;
        margin-top: 12px;
        background: rgba(248,113,113,0.08);
        border-radius: 8px;
      }
      @media (max-width: 480px) {
        #contact-tab {
          width: 95%;
        }
        #contact-form {
          padding: 16px;
        }
      }
    </style>

    <script>
      (function() {
        var tab = document.getElementById('contact-tab');
        var toggle = document.getElementById('contact-toggle');
        var form = document.getElementById('contact-form');
        var success = document.getElementById('contact-success');
        var error = document.getElementById('contact-error');
        var submitBtn = document.getElementById('contact-submit');

        toggle.addEventListener('click', function() {
          tab.classList.toggle('open');
        });

        form.addEventListener('submit', function(e) {
          e.preventDefault();
          submitBtn.disabled = true;
          submitBtn.textContent = 'Invio in corso...';
          success.classList.add('hidden-field');
          error.classList.add('hidden-field');

          var formData = new FormData(form);

          fetch('/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams(formData).toString()
          })
          .then(function(response) {
            if (response.ok) {
              success.classList.remove('hidden-field');
              form.reset();
            } else {
              error.classList.remove('hidden-field');
            }
          })
          .catch(function() {
            error.classList.remove('hidden-field');
          })
          .finally(function() {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Invia';
          });
        });
      })();
    </script>
  </body>
</html>
